<!DOCTYPE html>
<html>
<head>
  <title>Faucet Claim</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 16px;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    h2 {
      font-size: 20px;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #888;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .box {
      background: #1a1a1a;
      padding: 20px 16px;
      margin: auto;
      width: 100%;
      max-width: 400px;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    /* ── AD FRAME ── */
    .ad-frame {
      max-width: 318px;
      margin: 14px auto;
      padding: 2px;
      border-radius: 14px;
      background: linear-gradient(135deg, #444, #111, #333);
    }

    .ad-link {
      display: block;
      text-decoration: none;
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
    }

    .ad-image {
      width: 100%;
      height: 106px;
      display: block;
      margin: 0 auto;
      object-fit: cover;
      border: none;
    }

    .ad-fallback-text {
      display: block;
      padding: 14px 20px;
      background: linear-gradient(135deg, #e65c00, #f9d423);
      color: #fff;
      border-radius: 12px;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .ad-link.clicked .ad-fallback-text {
      background: linear-gradient(135deg, #1a7a3f, #28a745);
    }

    /* ── TIMER ── */
    #timerDiv {
      margin: 10px 0;
    }

    #timer {
      color: #f9a825;
      font-weight: bold;
      font-size: 14px;
    }

    /* ── A-ADS BANNER ── */
    .ad-banner {
      margin: 16px auto;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }

    /* ── CAPTCHA WRAPPER ── */
    #claimForm {
      margin-top: 14px;
    }

    .h-captcha {
      display: inline-block;
      margin-bottom: 10px;
    }

    /* ── CLAIM BUTTON ── */
    button {
      width: 100%;
      padding: 13px 20px;
      border: none;
      background: linear-gradient(135deg, #1a7a3f, #28a745);
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.4px;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    button:disabled {
      background: #2e2e2e;
      color: #666;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      opacity: 0.88;
    }

    /* ── STATUS MESSAGE ── */
    #msg {
      margin-top: 10px;
      font-size: 13px;
      min-height: 18px;
    }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 16px 0;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>💰 Faucet Claim Page</h2>
  <p class="subtitle">⚠️ You must click the sponsored link below before claiming.</p>

  <hr class="divider">

  <!-- AD FRAME -->
  <div class="ad-frame">
    <a class="ad-link" id="adLink" href="#" target="_blank" onclick="adClicked()">
      <img class="ad-image" id="adImage" src="" alt="Sponsored Ad" style="display:none;">
      <span class="ad-fallback-text" id="adFallbackText">🔥 Click Sponsored Link to Unlock Claim</span>
    </a>
  </div>

  <div id="timerDiv" style="display:none;">
    <p id="timer">⏳ Please wait <span id="countdown">10</span>s...</p>
  </div>

  <hr class="divider">

  <!-- A-ADS BANNER -->
  <div class="ad-banner" id="frame" style="width:300px; margin:auto; height:auto;">
    <iframe data-aa='2445360' src='//ad.a-ads.com/2445360/?size=300x250'
      style='border:0; padding:0; width:300px; height:250px; overflow:hidden; display:block; margin:auto;'></iframe>
  </div>

  <hr class="divider">

  <!-- CLAIM FORM -->
  <div id="claimForm">
    <div class="h-captcha" data-sitekey="d258eb2e-8840-45d0-a92c-2b3a28ee9b42"></div>
    <br>
    <button onclick="submitClaim()" id="claimBtn" disabled>🔒 Click Ad First</button>
  </div>

  <p id="msg" style="color:#f44336;"></p>
</div>

<script>
  if(window.Telegram && window.Telegram.WebApp){
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
  }

  const urlParams      = new URLSearchParams(window.location.search);
  const uid            = urlParams.get("uid");
  const token          = urlParams.get("token");
  const msg            = document.getElementById("msg");
  const claimBtn       = document.getElementById("claimBtn");
  const adLink         = document.getElementById("adLink");
  const adImage        = document.getElementById("adImage");
  const adFallbackText = document.getElementById("adFallbackText");
  const timerDiv       = document.getElementById("timerDiv");
  const countdown      = document.getElementById("countdown");

  // Build ad list from URL params
  let ads = [];
  for(let i = 1; i <= 3; i++){
    let u   = urlParams.get("ad" + i + "url");
    let t   = urlParams.get("ad" + i + "text");
    let img = urlParams.get("ad" + i + "img");
    if(u && t) ads.push({ url: u, text: t, img: img || null });
  }
  if(ads.length === 0){
    ads.push({
      url:  urlParams.get("adurl")  || "https://omg10.com/4/9787416",
      text: urlParams.get("adtext") || "🔥 Click Sponsored Link to Unlock Claim",
      img:  urlParams.get("adimg")  || null
    });
  }

  let currentAdIndex = 0;
  adImage.onerror = null;

  function showAd(index){
    let ad = ads[index];
    adLink.href = ad.url;
    if(ad.img){
      adImage.onerror = function(){
        adImage.style.display    = "none";
        adFallbackText.style.display = "block";
        adFallbackText.textContent   = ad.text;
        adImage.onerror = null;
      };
      adImage.src              = ad.img;
      adImage.style.display    = "block";
      adFallbackText.style.display = "none";
    } else {
      adImage.onerror = null;
      adImage.style.display    = "none";
      adFallbackText.style.display = "block";
      adFallbackText.textContent   = ad.text;
    }
  }
  showAd(currentAdIndex);

  let rotateInterval = null;
  if(ads.length > 1){
    rotateInterval = setInterval(() => {
      currentAdIndex = (currentAdIndex + 1) % ads.length;
      showAd(currentAdIndex);
    }, 5000);
  }

  if(!uid || !token){
    msg.innerText = "Invalid access link. Please open from bot.";
  }

  let adWasClicked = false;

  function adClicked(){
    if(adWasClicked) return;
    adWasClicked = true;

    if(rotateInterval) clearInterval(rotateInterval);

    adImage.style.display        = "none";
    adFallbackText.style.display = "block";
    adFallbackText.textContent   = "✅ Ad Opened! Please wait...";
    adLink.classList.add("clicked");
    adLink.style.pointerEvents   = "none";

    timerDiv.style.display = "block";
    let secs = 10;
    countdown.innerText = secs;

    let interval = setInterval(() => {
      secs--;
      countdown.innerText = secs;
      if(secs <= 0){
        clearInterval(interval);
        timerDiv.style.display   = "none";
        claimBtn.disabled        = false;
        claimBtn.innerText       = "✅ Verify & Claim";
        msg.style.color          = "#4caf50";
        msg.innerText            = "Ad verified! You can now claim.";
      }
    }, 1000);
  }

  function submitClaim(){
    let captcha = hcaptcha.getResponse();

    if(!captcha){
      alert("Please complete the captcha");
      return;
    }
    if(!uid || !token){
      alert("Missing verification data");
      return;
    }
    if(!adWasClicked){
      alert("Please click the sponsored link first!");
      return;
    }

    msg.style.color = "#4caf50";
    msg.innerText   = "✅ Verified! Closing...";
    claimBtn.disabled  = true;
    claimBtn.innerText = "Processing...";

    setTimeout(() => {
      window.location.href = "https://t.me/Clickgainersbot?start=faucet_" + uid + "_" + token;
      setTimeout(() => {
        if(window.Telegram && window.Telegram.WebApp){
          window.Telegram.WebApp.close();
        }
      }, 500);
    }, 1000);
  }
</script>

</body>
</html>
