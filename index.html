<div class="box">

  <h2>💰 Faucet Claim Page</h2>

  <!-- 🔥 SMARTLINK ADS -->
  <div class="smartlink">
    <a href="https://www.effectivecpmnetwork.com/sacf91gw?key=14eefb6c15adcfeb4b826a552b5af477" target="_blank">
      🔥 Sponsored Offer – Click to continue
    </a>
  </div>

  <div id="claimForm">

    <!-- hCaptcha -->
    <div class="h-captcha" data-sitekey="d258eb2e-8840-45d0-a92c-2b3a28ee9b42"></div>

    <br>

    <button onclick="submitClaim()">Verify & Claim</button>

  </div>

  <p id="msg" style="color:red;"></p>

<!-- 🔥 BOTTOM BANNER ADS -->
<div class="ad-bottom">

    atOptions = {
      'key' : 'f07970e08ef1e38472bb4d1d3518b491',

  </script>

<script>
  // Initialize Telegram Web App
  if(window.Telegram && window.Telegram.WebApp){
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
  }

  const urlParams = new URLSearchParams(window.location.search);
  const uid = urlParams.get("uid");
  const token = urlParams.get("token");

  const msg = document.getElementById("msg");

  if (!uid || !token) {
    msg.innerText = "Invalid access link. Please open from bot.";
  }

  function submitClaim() {

    let captcha = hcaptcha.getResponse();

    if (!captcha) {
      alert("Please complete captcha");
      return;
    }

    if (!uid || !token) {
      alert("Missing verification data");
      return;
    }

    msg.style.color = "green";
    msg.innerText = "✅ Verified! Closing...";

    // Disable button to prevent double claim
    document.querySelector("button").disabled = true;
    document.querySelector("button").innerText = "Processing...";

    setTimeout(() => {
      // Trigger bot reward via deep link
      window.location.href =
        "https://t.me/VeryTaskBot?start=faucet_" + uid + "_" + token;

      // Close Web App after short delay
      setTimeout(() => {
        if(window.Telegram && window.Telegram.WebApp){
          window.Telegram.WebApp.close();
        }
      }, 500);

    }, 1000);
  }
</script>
